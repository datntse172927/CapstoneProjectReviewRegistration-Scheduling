version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Capstone@PRN232_2026!
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone_api
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=CapstoneReviewDb;User Id=sa;Password=Capstone@PRN232_2026!;TrustServerCertificate=True;
    ports:
      - "5000:5000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: capstone_tunnel
    command: tunnel --url http://api:5000
    depends_on:
      - api

volumes:
  mssql_data:
